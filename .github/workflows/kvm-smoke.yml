name: kvm-smoke

on:
  workflow_dispatch:

jobs:
  smoke:
    name: Validate KVM device access on ARC runner
    runs-on: [self-hosted, linux, arc, kvm]
    steps:
      - name: Assert /dev/kvm is readable and writable
        run: |
          ls -l /dev/kvm
          test -r /dev/kvm
          test -w /dev/kvm
