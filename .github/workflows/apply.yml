name: apply

on:
  workflow_dispatch:
    inputs:
      run_terraform:
        description: "Run Terraform apply remotely over libvirt URI"
        type: boolean
        default: false
        required: true
      run_arc_install:
        description: "Install/upgrade ARC components"
        type: boolean
        default: true
        required: true
      run_kvm_autoscaler_apply:
        description: "Apply k8s KVM pool autoscaler manifests"
        type: boolean
        default: true
        required: true

permissions:
  contents: read

jobs:
  apply:
    runs-on: ubuntu-latest
    env:
      TAILSCALE_AUTHKEY: ${{ secrets.TAILSCALE_AUTHKEY }}
      TAILSCALE_OAUTH_CLIENT_ID: ${{ env.TAILSCALE_OAUTH_CLIENT_ID }}
      TAILSCALE_OAUTH_SECRET: ${{ env.TAILSCALE_OAUTH_SECRET }}
      LIBVIRT_DEFAULT_URI: ${{ secrets.LIBVIRT_URI }}
      ARC_GITHUB_CONFIG_URL: ${{ secrets.ARC_GITHUB_CONFIG_URL }}
      ARC_GITHUB_APP_ID: ${{ secrets.ARC_GITHUB_APP_ID }}
      ARC_GITHUB_APP_INSTALLATION_ID: ${{ secrets.ARC_GITHUB_APP_INSTALLATION_ID }}
      ARC_GITHUB_APP_PRIVATE_KEY: ${{ secrets.ARC_GITHUB_APP_PRIVATE_KEY }}
      ARC_CONTAINER_MAX_RUNNERS: ${{ secrets.ARC_CONTAINER_MAX_RUNNERS }}
      ARC_CONTAINER_MIN_RUNNERS: ${{ secrets.ARC_CONTAINER_MIN_RUNNERS }}
      ARC_DIND_MAX_RUNNERS: ${{ secrets.ARC_DIND_MAX_RUNNERS }}
      ARC_DIND_MIN_RUNNERS: ${{ secrets.ARC_DIND_MIN_RUNNERS }}
      TALOSCONFIG_B64: ${{ secrets.TALOSCONFIG_B64 }}
      KUBECONFIG_B64: ${{ secrets.KUBECONFIG_B64 }}
      KVM_AUTOSCALER_UNRAID_SSH_TARGET: ${{ secrets.KVM_AUTOSCALER_UNRAID_SSH_TARGET }}
      KVM_AUTOSCALER_SSH_PRIVATE_KEY: ${{ secrets.KVM_AUTOSCALER_SSH_PRIVATE_KEY }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate input mode
        run: |
          if [ "${{ inputs.run_terraform }}" != "true" ] && [ "${{ inputs.run_arc_install }}" != "true" ] && [ "${{ inputs.run_kvm_autoscaler_apply }}" != "true" ]; then
            echo "No operations selected; this is a dry run."
          fi

      - name: Validate required secrets
        run: |
          any_ops=false
          if [ "${{ inputs.run_terraform }}" = "true" ] || [ "${{ inputs.run_arc_install }}" = "true" ] || [ "${{ inputs.run_kvm_autoscaler_apply }}" = "true" ]; then
            any_ops=true
          fi

          if [ "$any_ops" = "true" ]; then
            has_oauth=true
            if [ -z "${TAILSCALE_OAUTH_CLIENT_ID:-}" ] || [ -z "${TAILSCALE_OAUTH_SECRET:-}" ]; then
              has_oauth=false
            fi

            has_authkey=true
            if [ -z "${TAILSCALE_AUTHKEY:-}" ]; then
              has_authkey=false
            fi

            if [ "$has_oauth" != "true" ] && [ "$has_authkey" != "true" ]; then
              echo "Missing Tailscale credentials: set OAuth client secrets (preferred) or TAILSCALE_AUTHKEY" >&2
              exit 1
            fi
          fi

          if [ "${{ inputs.run_terraform }}" = "true" ] && [ -z "${LIBVIRT_DEFAULT_URI:-}" ]; then
            echo "Missing required secret for terraform: LIBVIRT_URI" >&2
            exit 1
          fi

          if [ "${{ inputs.run_arc_install }}" = "true" ]; then
            arc_required=(ARC_GITHUB_CONFIG_URL ARC_GITHUB_APP_ID ARC_GITHUB_APP_INSTALLATION_ID ARC_GITHUB_APP_PRIVATE_KEY KUBECONFIG_B64)
            for key in "${arc_required[@]}"; do
              if [ -z "${!key:-}" ]; then
                echo "Missing required secret for ARC install: ${key}" >&2
                exit 1
              fi
            done
          fi

          if [ "${{ inputs.run_kvm_autoscaler_apply }}" = "true" ]; then
            autoscaler_required=(KVM_AUTOSCALER_UNRAID_SSH_TARGET KVM_AUTOSCALER_SSH_PRIVATE_KEY KUBECONFIG_B64)
            for key in "${autoscaler_required[@]}"; do
              if [ -z "${!key:-}" ]; then
                echo "Missing required secret for autoscaler: ${key}" >&2
                exit 1
              fi
            done
          fi

      - name: Connect runner to tailnet (OAuth)
        if: ${{ (inputs.run_terraform || inputs.run_arc_install || inputs.run_kvm_autoscaler_apply) && env.TAILSCALE_OAUTH_CLIENT_ID != '' && env.TAILSCALE_OAUTH_SECRET != '' }}
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ env.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ env.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Connect runner to tailnet (Authkey fallback)
        if: ${{ (inputs.run_terraform || inputs.run_arc_install || inputs.run_kvm_autoscaler_apply) && (env.TAILSCALE_OAUTH_CLIENT_ID == '' || env.TAILSCALE_OAUTH_SECRET == '') }}
        uses: tailscale/github-action@v3
        with:
          authkey: ${{ secrets.TAILSCALE_AUTHKEY }}
          tags: tag:ci

      - name: Install toolchain
        if: ${{ inputs.run_arc_install || inputs.run_kvm_autoscaler_apply }}
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext-base
          curl -fsSL https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          curl -fsSL -o kubectl https://dl.k8s.io/release/v1.31.4/bin/linux/amd64/kubectl
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/kubectl

      - name: Install terraform
        if: ${{ inputs.run_terraform }}
        uses: hashicorp/setup-terraform@v3

      - name: Write talosconfig
        if: ${{ inputs.run_arc_install || inputs.run_kvm_autoscaler_apply }}
        run: |
          if [ -n "${TALOSCONFIG_B64:-}" ]; then
            mkdir -p "$HOME/.talos"
            echo "$TALOSCONFIG_B64" | base64 -d > "$HOME/.talos/config"
          else
            echo "TALOSCONFIG_B64 is empty; skipping talosconfig write"
          fi

      - name: Write kubeconfig
        if: ${{ inputs.run_arc_install || inputs.run_kvm_autoscaler_apply }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_B64" | base64 -d > "$HOME/.kube/config"

      - name: Terraform apply (manual-only fallback)
        if: ${{ inputs.run_terraform }}
        working-directory: terraform/libvirt
        run: |
          terraform init
          terraform apply -auto-approve

      - name: Install ARC scale sets
        if: ${{ inputs.run_arc_install }}
        run: |
          ./k8s/arc/install.sh

      - name: Apply KVM pool autoscaler
        if: ${{ inputs.run_kvm_autoscaler_apply }}
        run: |
          kubectl -n arc-systems create secret generic kvm-pool-autoscaler \
            --from-literal=unraid_ssh_target="${KVM_AUTOSCALER_UNRAID_SSH_TARGET}" \
            --from-file=id_ed25519=<(printf '%s' "${KVM_AUTOSCALER_SSH_PRIVATE_KEY}") \
            --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -k k8s/kvm-pool-autoscaler
