clusterName: arc-talos
endpoint: https://10.0.0.10:6443
kubernetesVersion: v1.31.4
talosVersion: v1.8.4
allowSchedulingOnControlPlanes: false

nodes:
  - hostname: arc-talos-cp-1
    ipAddress: 10.0.0.11
    controlPlane: true
    installDisk: /dev/vda

  - hostname: arc-talos-wk-1
    ipAddress: 10.0.0.21
    controlPlane: false
    installDisk: /dev/vda
    nodeLabels:
      nodepool.syscode.dev/type: general

  - hostname: arc-talos-kvm-1
    ipAddress: 10.0.0.31
    controlPlane: false
    installDisk: /dev/vda
    nodeLabels:
      nodepool.syscode.dev/type: kvm
      arc.example.dev/kvm: "true"
    nodeTaints:
      - arc.example.dev/kvm=true:NoSchedule

  - hostname: arc-talos-kvm-2
    ipAddress: 10.0.0.32
    controlPlane: false
    installDisk: /dev/vda
    nodeLabels:
      nodepool.syscode.dev/type: kvm
      arc.example.dev/kvm: "true"
    nodeTaints:
      - arc.example.dev/kvm=true:NoSchedule

  - hostname: arc-talos-kvm-3
    ipAddress: 10.0.0.33
    controlPlane: false
    installDisk: /dev/vda
    nodeLabels:
      nodepool.syscode.dev/type: kvm
      arc.example.dev/kvm: "true"
    nodeTaints:
      - arc.example.dev/kvm=true:NoSchedule
